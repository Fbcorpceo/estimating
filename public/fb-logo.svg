<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" aria-label="FB">
  <g fill="#F37021" stroke="#F37021">
    <!-- Tower mast -->
    <rect x="72" y="12" width="18" height="62" stroke="none"/>
    <!-- Tower diagonals -->
    <path d="M 72 12 L 90 74 M 90 12 L 72 74" stroke-width="3" fill="none"/>

    <!-- Upper jib chord -->
    <rect x="6" y="8" width="320" height="7" stroke="none"/>
    <!-- Lower jib chord -->
    <rect x="6" y="48" width="320" height="7" stroke="none"/>

    <!-- Jib truss (zig-zag) -->
    <path d="M 10 15 L 30 48 L 50 15 L 70 48 L 90 15 L 110 48 L 130 15 L 150 48 L 170 15 L 190 48 L 210 15 L 230 48 L 250 15 L 270 48 L 290 15 L 310 48 L 322 15"
      stroke-width="4" fill="none"/>

    <!-- Cable -->
    <line x1="298" y1="55" x2="298" y2="118" stroke-width="3"/>
    <!-- Hook ring -->
    <circle cx="298" cy="128" r="10" stroke-width="4" fill="none"/>
    <!-- Hook curve -->
    <path d="M 290 140 Q 290 158 306 158 Q 322 158 322 146" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Letter F -->
    <path d="M 30 86 L 30 210 L 62 210 L 62 160 L 106 160 L 106 136 L 62 136 L 62 110 L 118 110 L 118 86 Z" stroke="none"/>

    <!-- Letter B -->
    <path d="M 146 86 L 146 210 L 210 210 Q 250 210 250 178 Q 250 155 232 148 Q 248 140 248 118 Q 248 86 212 86 Z
             M 174 110 L 210 110 Q 222 110 222 122 Q 222 134 210 134 L 174 134 Z
             M 174 156 L 212 156 Q 226 156 226 172 Q 226 186 212 186 L 174 186 Z"
      fill-rule="evenodd" stroke="none"/>
  </g>
</svg>
